<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bar Belledonne</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#2BA89A;--cream:#2A2A2A;--dark:#EAF8F7;--card:#FFFFFF;--border:rgba(43,168,154,0.2);--muted:rgba(60,60,60,0.55);--g2:#2BA89A;--r2:#C0524A;--o2:#D4875A;--b2:#F4B8C8}
html,body{height:100%;overflow:hidden}
body{background:var(--dark);color:#2A2A2A;font-family:'DM Sans',sans-serif;font-size:14px;display:flex;flex-direction:column}
#hdr{flex-shrink:0;background:linear-gradient(160deg,#B2E8E4,#D4F5F2);border-bottom:1px solid var(--border);padding:12px 16px 0}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
.logo em{font-style:italic;color:#2A2A2A}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
.kpi{text-align:center}
.kv{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;line-height:1;color:var(--gold)}
.kl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
#tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);padding:0}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 12px;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:#2BA89A;border-bottom-color:#2BA89A;font-weight:600}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 90px}
#bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(210,248,245,.98);border-top:1px solid rgba(43,168,154,.2);display:flex;padding:6px 0;padding-bottom:env(safe-area-inset-bottom,6px);z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0}
.ni-ic{font-size:18px}
.ni-lb{font-size:8px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.ni.on .ni-lb{color:#2BA89A}
/* CARDS */
.card{background:#FFFFFF;border:1px solid rgba(43,168,154,.2);border-radius:12px;overflow:hidden;margin-bottom:7px;box-shadow:0 2px 8px rgba(43,168,154,.1)}
.card.open{border-color:rgba(43,168,154,.5)}
.card.low{border-color:rgba(224,112,112,.4)}
.card-top{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;min-height:56px}
.c-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-family:'Cormorant Garamond',serif;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:10px;color:var(--muted);margin-top:2px}
.c-stocks{display:flex;gap:6px;align-items:center;flex-shrink:0}
.stk{text-align:center;min-width:32px}
.sv{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;line-height:1}
.sv.mag{color:var(--b2)}.sv.bar{color:var(--gold)}.sv.zero{color:#C0524A}.sv.low{color:var(--r2)}
.sl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.sep{width:1px;height:24px;background:var(--border)}
/* DETAIL */
.card-body{padding:0 13px 13px;border-top:1px solid var(--border)}
.sum3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.sb{border-radius:9px;padding:8px 6px;text-align:center}
.sb-v{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1}
.sb-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
/* MOVEMENT BOXES */
.mv{border-radius:10px;padding:10px 12px;margin-top:8px}
.mv-mag{background:rgba(244,184,200,.1);border:1px solid rgba(244,184,200,.22)}
.mv-tra{background:rgba(43,168,154,.07);border:1px solid rgba(43,168,154,.22)}
.mv-ven{background:rgba(111,207,151,.07);border:1px solid rgba(111,207,151,.22)}
.mv-t{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600}
.t-b{color:var(--b2)}.t-g{color:var(--gold)}.t-gr{color:var(--g2)}.t-r{color:var(--r2)}
.mv-row{display:flex;gap:7px;align-items:center}
.mv-in{background:rgba(43,168,154,.06);border:1px solid var(--border);border-radius:8px;padding:8px;color:#2A2A2A;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;outline:none;text-align:center;width:72px;flex-shrink:0}
.mv-in:focus{border-color:var(--gold)}
.mv-lbl{flex:1;font-size:11px;color:var(--muted)}
.btn{border:none;border-radius:8px;padding:9px 12px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.btn-blu{background:rgba(244,184,200,.25);color:var(--b2);border:1px solid rgba(244,184,200,.35)!important}
.btn-gld{background:#2BA89A;color:#FFFFFF}
.btn-grn{background:rgba(43,168,154,.3);color:var(--g2);border:1px solid rgba(43,168,154,.3)!important}
.btn-red{background:rgba(192,82,74,.3);color:var(--r2);border:1px solid rgba(192,82,74,.3)!important}
.btn-sm{background:rgba(43,168,154,.06);border:1px solid var(--border);border-radius:8px;padding:7px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex:1;text-align:center}
.acts{display:flex;gap:7px;margin-top:8px}
/* HALF BTN */
.half-row{display:flex;align-items:center;gap:8px;padding-top:7px;border-top:1px solid var(--border);margin-top:6px}
.hb{padding:4px 9px;border-radius:6px;border:1px solid var(--border);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
/* FOOD COST */
.fc-box{background:rgba(43,168,154,.03);border-radius:9px;padding:10px;margin-top:8px;font-size:11px;line-height:1.9;color:var(--muted)}
.fc-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.fcg{background:rgba(43,168,154,.15);color:#2BA89A;border:1px solid rgba(26,92,58,.35)}
.fco{background:rgba(212,135,90,.15);color:#B06840;border:1px solid rgba(122,74,8,.35)}
.fcr{background:rgba(192,82,74,.15);color:var(--r2);border:1px solid rgba(192,82,74,.25)}
/* COCKTAIL */
.ck-top{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer}
.ck-name{font-family:'Cormorant Garamond',serif;font-size:16px;flex:1}
.ck-body{padding:0 13px 13px;border-top:1px solid var(--border)}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(43,168,154,.07);font-size:12px}
.ing-row:last-child{border:none}
.ing-d{color:var(--muted);font-size:11px;margin:0 6px;white-space:nowrap}
.ing-c{color:var(--gold);font-weight:600;white-space:nowrap;min-width:44px;text-align:right}
.ck-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
.cs-b{background:rgba(43,168,154,.04);border-radius:8px;padding:7px 5px;text-align:center}
.cs-v{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;line-height:1}
.cs-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.pv-row{display:flex;gap:8px;align-items:center;margin-top:10px;background:rgba(43,168,154,.03);border-radius:9px;padding:9px 11px}
.pv-in{background:rgba(43,168,154,.06);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:#2A2A2A;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;outline:none;width:76px;text-align:right}
.chip{background:rgba(43,168,154,.07);border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:10px;color:var(--muted)}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
/* PREP */
.prep-top{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer}
.prep-body{padding:0 13px 13px;border-top:1px solid var(--border)}
.resa-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;margin-top:10px}
.resa-bar{height:6px;background:rgba(43,168,154,.06);border-radius:3px;overflow:hidden;margin-bottom:10px}
.resa-f{height:100%;border-radius:3px}
.step{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(43,168,154,.06);font-size:12px;line-height:1.5}
.step:last-child{border:none}
.sn{color:var(--gold);font-weight:700;flex-shrink:0;width:16px}
.prep-edit{background:rgba(43,168,154,.07);border:1px solid rgba(43,168,154,.18);border-radius:9px;padding:10px;margin-top:10px}
.pe-t{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.pe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.pe-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.pe-in{background:rgba(43,168,154,.06);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:#2A2A2A;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;outline:none;width:100%;text-align:right}
.pe-in:focus{border-color:var(--gold)}
/* STORICO */
.sto-day{margin-bottom:12px}
.sto-hdr{font-size:10px;color:#2BA89A;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;background:rgba(43,168,154,.08);border-radius:6px;margin-bottom:6px}
.sto-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.sto-row:last-child{border:none}
.sto-q{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600}
/* RIMBORSI */
.rimb-prod{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px}
/* REPORT */
.rep-kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.rk{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.rk-v{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);font-weight:600;line-height:1}
.rk-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.al-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-radius:9px;margin-bottom:5px;font-size:12px}
.al-r{background:rgba(192,82,74,.12);border:1px solid rgba(192,82,74,.25)}
.al-o{background:rgba(43,168,154,.1);border:1px solid rgba(43,168,154,.25)}
.bar-r{margin-bottom:7px}
.bar-lb{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-bg{height:4px;background:rgba(43,168,154,.06);border-radius:2px}
.bar-f{height:100%;background:var(--gold);border-radius:2px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(43,168,154,.3);z-index:200;display:none;align-items:flex-end}
.overlay.on{display:flex}
.modal{background:#F0FAFA;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border);animation:up .28s ease;padding-bottom:env(safe-area-inset-bottom,16px)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-hdl{width:38px;height:4px;background:rgba(43,168,154,.25);border-radius:2px;margin:11px auto}
.m-tit{font-family:'Cormorant Garamond',serif;font-size:21px;padding:0 18px 14px;color:var(--gold);border-bottom:1px solid var(--border)}
.m-body{padding:14px 18px}
.fl{margin-bottom:12px}
.fl label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px}
.fi{width:100%;background:rgba(43,168,154,.07);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:#2A2A2A;font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.fi:focus{border-color:var(--gold)}
.fi option{background:#F0FAFA}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-sub{width:100%;background:#2BA89A;color:#FFFFFF;border:none;border-radius:12px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px}
.btn-cnl{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}
.m-div{height:1px;background:var(--border);margin:12px 0}
.m-sub{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.hint{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
/* TOAST */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(14px);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#1A5C3A;color:#fff}
.toast.err{background:#6A1010;color:#fff}
.toast.inf{background:#1A3060;color:#fff}
/* MISC */
.tb{display:flex;gap:8px;margin-bottom:12px}
.srch{flex:1;background:rgba(43,168,154,.07);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:#2A2A2A;font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.srch:focus{border-color:var(--gold)}
.srch::placeholder{color:var(--muted)}
.btn-add{background:#2BA89A;color:#FFFFFF;border:none;border-radius:10px;padding:9px 13px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.info{background:rgba(43,168,154,.07);border:1px solid rgba(43,168,154,.2);border-radius:10px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6}
.alert-strip{background:rgba(192,82,74,.12);border:1px solid rgba(192,82,74,.25);border-radius:10px;padding:9px 13px;margin-bottom:12px;font-size:12px;line-height:1.6}
.empty{text-align:center;padding:32px 16px;color:var(--muted)}
.empty .ei{font-size:34px;margin-bottom:8px;opacity:.4}
.sec-t{font-size:11px;color:#2BA89A;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;font-weight:600}

function pA(d){if(pe.length>=4)return;pe+=d;pU();if(pe.length===4)setTimeout(pC,200);}
function pD(){pe=pe.slice(0,-1);pU();document.getElementById('pm').textContent='';}
function pU(){var s='';for(var i=0;i<4;i++)s+=i<pe.length?'●':'_';document.getElementById('pd').textContent=s;}
function pC(){
  if(pe===PIN_MGR||pe===PIN_STF){
    isManager=(pe===PIN_MGR);
    var l=document.getElementById('ls');
    l.style.transition='opacity .4s';l.style.opacity='0';
    setTimeout(function(){
      l.style.display='none';
      var badge=document.getElementById('role-badge');
      if(badge){badge.textContent=isManager?'👑 Manager':'👁 Staff';badge.style.display='inline-block';}
    },400);
  }else{
    document.getElementById('pm').textContent='Codice errato';
    document.getElementById('pd').style.color='#C0524A';
    setTimeout(function(){pe='';pU();document.getElementById('pm').textContent='';document.getElementById('pd').style.color='#2BA89A';},1000);
  }
}
</script>

// FIREBASE — storage condiviso in tempo reale
// ══════════════════════════════════════
var FB_URL = "https://magnolia---bar-default-rtdb.europe-west1.firebasedatabase.app";

function fbGet(key, cb){
  fetch(FB_URL+"/"+key+".json")
    .then(function(r){return r.json();})
    .then(function(v){cb(v);})
    .catch(function(){cb(null);});
}

function fbSet(key, val){
  fetch(FB_URL+"/"+key+".json", {
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(val)
  }).catch(function(){});
  localStorage.setItem("bb_"+key, JSON.stringify(val));
}

function sg(k){
  try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}
}

function ss(k, v){
  localStorage.setItem(k, JSON.stringify(v));
  var fbKey = k.replace("bb_","");
  fbSet(fbKey, v);
}

// Sincronizza da Firebase ogni 8 secondi
var _lastSync = {};
function syncFromFirebase(){
  var keys = ["prods","sto","rimb","stor","rimb_prods","acq_bar"];
  keys.forEach(function(k){
    fbGet(k, function(v){
      if(v===null) return;
      var local = sg("bb_"+k);
      var remoteStr = JSON.stringify(v);
      var localStr = JSON.stringify(local);
      if(remoteStr !== localStr && remoteStr !== _lastSync[k]){
        _lastSync[k] = remoteStr;
        localStorage.setItem("bb_"+k, remoteStr);
        render();
      }
    });
  });
}
setInterval(syncFromFirebase, 8000);

// Carica da Firebase all'avvio
function loadFromServer(){
  var keys = ["prods","sto","rimb","stor","rimb_prods","acq_bar"];
  var done = 0;
  keys.forEach(function(k){
    fbGet(k, function(v){
      if(v !== null){
        localStorage.setItem("bb_"+k, JSON.stringify(v));
        _lastSync[k] = JSON.stringify(v);
      }
      done++;
      if(done === keys.length) render();
    });
  });
}

function initAll(){

    var ps = [];
    for(var i=0;i<INIT_PRODS.length;i++){
      var p = JSON.parse(JSON.stringify(INIT_PRODS[i]));
      p.id = i+1;
      ps.push(p);
    }
    sProds(ps);
  }
  if(!gPreps().length){
    sPreps(JSON.parse(JSON.stringify(INIT_PREPS)));
  }
}

// ══════════════════════════════════════
// FOOD COST
// ══════════════════════════════════════
function cpmP(p){
  if(!p.vol||!p.pA) return 0;
  return p.pA/p.vol;
}
function cpmPrep(ref){
  var preps = gPreps();
  for(var i=0;i<preps.length;i++){
    if(preps[i].id===ref) return preps[i].costo&&preps[i].resa ? preps[i].costo/preps[i].resa : 0;
  }
  return 0;
}
function costoIng(ing){
  if(ing.t==='d'){
    var ps = gProds();
    for(var i=0;i<ps.length;i++){
      if(ps[i].n===ing.r||(ing.r&&ps[i].n.indexOf(ing.r.split(' ')[0])>=0)){
        if(ing.u==='ml') return cpmP(ps[i])*ing.d;
        return null;
      }
    }
  }
  if(ing.t==='p'&&ing.r){
    var c = cpmPrep(ing.r);
    if(c>0&&ing.u==='ml') return c*ing.d;
  }
  return null;
}
function costoTotCk(ck){
  var tot=0, cnt=0;
  for(var i=0;i<ck.ing.length;i++){
    var c = costoIng(ck.ing[i]);
    if(c!==null){tot+=c;cnt++;}
  }
  return {costo:tot,cnt:cnt,tot:ck.ing.length};
}
function fcPct(c,v){if(!v||v===0)return null;return (c/v)*100;}
function fcCls(pct){if(pct===null)return'';if(pct<=20)return'fcg';if(pct<=30)return'fco';return'fcr';}
function fcIco(pct){if(pct===null)return'—';if(pct<=20)return'✅';if(pct<=30)return'⚠️';return'🔴';}

  updateKpi();
  renderTabs();
  var m = document.getElementById('main');
  var html = '';
  if(VIEW==='mag') html = rMag();
  else if(VIEW==='bar') html = rBar();
  else if(VIEW==='cocktail') html = rCocktail();
  else if(VIEW==='prep') html = rPrep();
  else if(VIEW==='rimborsi') html = rRimborsi();
  else if(VIEW==='acquisti') html = rAcquisti();
  else if(VIEW==='report') html = rReport();
  m.innerHTML = html;
  var db = document.getElementById('dateBadge');
  if(db) db.textContent = new Date().toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
}

function updateKpi(){
  var ps = gProds();
  var tMag=0, tBar=0, al=0;
  for(var i=0;i<ps.length;i++){
    tMag+=ps[i].mag||0;
    tBar+=(ps[i].bar||0)+(ps[i].barM?0.5:0);
    if((ps[i].mag||0)+(ps[i].bar||0)<=(ps[i].min||0)) al++;
  }
  var prices = gCkP();
  var fcTot=0, fcN=0;
  for(var j=0;j<COCKTAILS.length;j++){
    var res = costoTotCk(COCKTAILS[j]);
    var pv = prices[COCKTAILS[j].id]||0;
    var pct = fcPct(res.costo,pv);
    if(pct!==null){fcTot+=pct;fcN++;}
  }
  var fcAvg = fcN>0 ? (fcTot/fcN).toFixed(0)+'%' : '—';
  document.getElementById('kMag').textContent = tMag;
  document.getElementById('kBar').textContent = tBar;
  document.getElementById('kFC').textContent = fcAvg;
  document.getElementById('kAl').textContent = al;
}

var CATS = ['Gin','Vodka','Whisky','Rum','Tequila','Amari','Liquori','Aperitivi','Vermouth','Bollicine','Birra','Mixer'];

function renderTabs(){
  var el = document.getElementById('tabs');
  if(VIEW!=='mag'&&VIEW!=='bar'){el.innerHTML='';return;}
  var h = '<div class="tab '+(CAT_F==='tutti'?'on':'')+'" onclick="setC(\'tutti\')">Tutti</div>';
  for(var i=0;i<CATS.length;i++){
    h += '<div class="tab '+(CAT_F===CATS[i]?'on':'')+'" onclick="setC(\''+CATS[i]+'\')">'+CATS[i]+'</div>';
  }
  el.innerHTML = h;
}

// ══════════════════════════════════════
// MAGAZZINO
// ══════════════════════════════════════
function rMag(){
  var ps = gProds();
  if(CAT_F!=='tutti') ps = ps.filter(function(p){return p.c===CAT_F;});
  if(SEARCH) ps = ps.filter(function(p){return p.n.toLowerCase().indexOf(SEARCH.toLowerCase())>=0;});
  var alerts = ps.filter(function(p){return (p.mag||0)+(p.bar||0)<=(p.min||0);});
  var h = '<div class="tb"><input class="srch" placeholder="🔍 Cerca..." value="'+SEARCH+'" oninput="SEARCH=this.value;render()"><button class="btn-add" onclick="openAdd()">+ Nuovo</button></div>';
  h += '<div class="info">📦 <strong>Magazzino Centrale</strong> — Carica quando arriva la merce. Trasferisci al Bar quando porti le bottiglie sul bancone.</div>';
  if(alerts.length){
    h += '<div class="alert-strip">⚠️ <strong>'+alerts.length+' prodott'+(alerts.length>1?'i':'o')+' sotto scorta:</strong> ';
    h += alerts.map(function(a){return a.n;}).join(', ')+'</div>';
  }
  if(!ps.length) return h+'<div class="empty"><div class="ei">📦</div><p>Nessun prodotto</p></div>';
  for(var i=0;i<ps.length;i++) h += rCard(ps[i]);
  return h;
}

// ══════════════════════════════════════
// BAR
// ══════════════════════════════════════
function rBar(){
  var ps = gProds();
  if(CAT_F!=='tutti') ps = ps.filter(function(p){return p.c===CAT_F;});
  if(SEARCH) ps = ps.filter(function(p){return p.n.toLowerCase().indexOf(SEARCH.toLowerCase())>=0;});
  var bps = ps.filter(function(p){return (p.bar||0)>0||p.barM;});
  var h = '<div class="tb"><input class="srch" placeholder="🔍 Cerca..." value="'+SEARCH+'" oninput="SEARCH=this.value;render()"></div>';
  h += '<div class="info">🍾 <strong>Bar</strong> — Bottiglie sul bancone. Registra il venduto a fine serata. Per aggiungere: vai in Magazzino e trasferisci.</div>';
  if(!bps.length) return h+'<div class="empty"><div class="ei">🍾</div><p>Nessuna bottiglia al bar ancora</p><p style="font-size:12px;margin-top:8px">Vai in Magazzino, apri un prodotto e premi Trasferisci al Bar</p></div>';
  for(var i=0;i<bps.length;i++) h += rCard(bps[i]);
  return h;
}

// ══════════════════════════════════════
// PRODUCT CARD
// ══════════════════════════════════════
function rCard(p){
  var tot = (p.mag||0)+(p.bar||0)+(p.barM?0.5:0);
  var bStk = (p.bar||0)+(p.barM?0.5:0);
  var isAl = tot<=(p.min||0);
  var cpm = cpmP(p);
  var cD = cpm*(p.dose||50);
  var pct = fcPct(cD,p.pV);
  var bg = CAT_COLORS[p.c]||'#3A3A3A';
  var mCls = (p.mag||0)===0?'zero':(p.mag||0)<=(p.min||0)?'low':'mag';
  var bCls = bStk===0?'zero':bStk<1?'low':'bar';

  var h = '<div class="card'+(isAl?' low':'')+('" id="pc-'+p.id+'">'  );
  h += '<div class="card-top" onclick="tP('+p.id+')">';
  h += '<div class="c-ico" style="background:'+bg+'22">'+(CAT_ICS[p.c]||'🍾')+'</div>';
  h += '<div class="c-info"><div class="c-name">'+p.n+'</div>';
  h += '<div class="c-sub">'+p.c+' · '+( p.vol||700)+'ml'+(p.pA>0?' · €'+p.pA.toFixed(2):''+(cD>0?' · €'+cD.toFixed(2)+'/dose':''))+'</div></div>';
  h += '<div class="c-stocks">';
  h += '<div class="stk"><div class="sv '+mCls+'">'+(p.mag||0)+'</div><div class="sl">Mag.</div></div>';
  h += '<div class="sep"></div>';
  h += '<div class="stk"><div class="sv '+bCls+'">'+bStk+'</div><div class="sl">Bar</div></div>';
  h += '</div></div>';

  h += '<div id="pb-'+p.id+'" style="display:none"><div class="card-body">';

  // SUMMARY
  h += '<div class="sum3">';
  h += '<div class="sb" style="background:rgba(244,184,200,.12);border:1px solid rgba(244,184,200,.2)"><div class="sb-v" style="color:var(--b2)">'+(p.mag||0)+'</div><div class="sb-l">📦 Magazzino</div></div>';
  h += '<div class="sb" style="background:rgba(43,168,154,.1);border:1px solid rgba(43,168,154,.2)"><div class="sb-v" style="color:var(--gold)">'+bStk+'</div><div class="sb-l">🍾 Bar'+(p.barM?' (½)':'')+'</div></div>';
  h += '<div class="sb" style="background:rgba(111,207,151,.08);border:1px solid rgba(111,207,151,.2)"><div class="sb-v" style="color:var(--g2)">'+tot+'</div><div class="sb-l">Totale</div></div>';
  h += '</div>';

  // CARICO MAGAZZINO
  h += '<div class="mv mv-mag">';
  h += '<div class="mv-t t-b">📦 Carico Magazzino — dalla fattura</div>';
  h += '<div class="mv-row"><input class="mv-in" type="number" id="mi'+p.id+'" placeholder="0" min="0" oninput="updLT('+p.id+','+( p.vol||700)+')"><span class="mv-lbl">bott. ricevute → <span id="lt'+p.id+'" style="color:var(--gold);font-weight:600">0 LT</span></span><button class="btn btn-blu" onclick="cMag('+p.id+')">+ Carica</button></div>';
  h += '</div>';

  // TRASFERIMENTO
  h += '<div class="mv mv-tra">';
  h += '<div class="mv-t t-g">🔄 Trasferisci Magazzino → Bar</div>';
  h += '<div class="mv-row" style="margin-bottom:7px"><input class="mv-in" type="number" id="ti'+p.id+'" placeholder="0" min="0"><span class="mv-lbl">bottiglie al bar</span><button class="btn btn-gld" onclick="tras('+p.id+')">→ Bar</button></div>';
  h += '<div class="half-row"><span style="font-size:11px;color:var(--muted);flex:1">🥂 Bottiglia aperta al bar</span>';
  h += '<button class="hb" style="background:'+(p.barM?'transparent':'rgba(43,168,154,.2)')+';color:'+(p.barM?'#888':'var(--gold)')+'" onclick="sMez('+p.id+',false)">No</button>';
  h += '<button class="hb" style="background:'+(p.barM?'rgba(43,168,154,.2)':'transparent')+';color:'+(p.barM?'var(--gold)':'#888')+'" onclick="sMez('+p.id+',true)">½ Sì</button>';
  h += '</div></div>';

  // VENDUTO
  h += '<div class="mv mv-ven">';
  h += '<div class="mv-t t-gr">🔻 Venduto dal Bar — fine serata</div>';
  h += '<div class="mv-row"><input class="mv-in" type="number" id="vi'+p.id+'" placeholder="0" min="0"><span class="mv-lbl">bottiglie consumate</span><button class="btn btn-red" onclick="vend('+p.id+')">− Venduto</button></div>';
  h += '</div>';

  // FOOD COST
  if(p.pA>0){
    h += '<div class="fc-box">';
    h += '<strong style="color:#2A2A2A">💰 Food Cost:</strong><br>';
    h += '€'+p.pA.toFixed(2)+' ÷ '+p.vol+'ml = <strong style="color:var(--gold)">€'+cpm.toFixed(4)+'/ml</strong><br>';
    h += '× '+(p.dose||50)+'ml = <strong style="color:var(--gold)">€'+cD.toFixed(2)+' per dose</strong>';
    if(pct!==null){
      h += '<br>Vend. €'+p.pV.toFixed(2)+' → <span class="fc-badge '+fcCls(pct)+'">'+fcIco(pct)+' '+pct.toFixed(1)+'% FC</span>';
      if(pct>30) h += '<br><span style="color:var(--r2)">🔴 Sopra 30%! Prezzo min: €'+(cD/0.30).toFixed(2)+'</span>';
    }
    h += '</div>';
  }

  h += '<div class="acts">';
  h += '<button class="btn-sm" onclick="openEdit('+p.id+')">✏️ Modifica</button>';
  h += '<button class="btn-sm" onclick="openSto('+p.id+')">📋 Storico</button>';
  h += '<button class="btn-sm" style="border-color:rgba(192,82,74,.3);color:var(--r2)" onclick="delP('+p.id+')">🗑️</button>';
  h += '</div>';

  h += '</div></div></div>';
  return h;
}

function tP(id){
  var el = document.getElementById('pb-'+id);
  var card = document.getElementById('pc-'+id);
  var open = el.style.display!=='none';
  el.style.display = open?'none':'block';
  if(open) card.classList.remove('open'); else card.classList.add('open');
}

// ══════════════════════════════════════
// MOVIMENTI
// ══════════════════════════════════════
function addSto(item){
  var s = gSto();
  item.id = Date.now();
  item.data = new Date().toLocaleDateString('it-IT');
  item.ora = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  s.unshift(item);
  sSto(s.slice(0,500));
}

function checkMgr(){
  if(!isManager){toast('Solo il manager può modificare','err');return false;}
  return true;
}
function cMag(id){
  if(!checkMgr()) return;
  var qty = parseInt(document.getElementById('mi'+id).value)||0;
  if(!qty){toast('Inserisci quantità','err');return;}
  var ps = gProds();
  for(var i=0;i<ps.length;i++){
    if(ps[i].id===id){
      ps[i].mag=(ps[i].mag||0)+qty;
      sProds(ps);
      var litri = ((qty*(ps[i].vol||700))/1000).toFixed(2);
      addSto({tipo:'carico',nome:ps[i].n,qty:qty,desc:'+'+qty+' ('+litri+' LT) in Magazzino'});
      toast('📦 +'+qty+' bott. = '+litri+' LT','ok');
      render();
      setTimeout(function(){tP(id);},80);
      return;
    }
  }
}

function updLT(id,vol){
  var qty = parseInt(document.getElementById('mi'+id).value)||0;
  var el = document.getElementById('lt'+id);
  if(el) el.textContent = ((qty*vol)/1000).toFixed(2)+' LT';
}

function tras(id){
  if(!checkMgr()) return;
  var qty = parseInt(document.getElementById('ti'+id).value)||0;
  if(!qty){toast('Inserisci quantità','err');return;}
  var ps = gProds();
  for(var i=0;i<ps.length;i++){
    if(ps[i].id===id){
      if(qty>(ps[i].mag||0)){toast('Solo '+ps[i].mag+' in magazzino!','err');return;}
      ps[i].mag=(ps[i].mag||0)-qty;
      ps[i].bar=(ps[i].bar||0)+qty;
      sProds(ps);
      addSto({tipo:'trasf',nome:ps[i].n,qty:qty,desc:qty+' Mag → Bar'});
      toast('🔄 '+qty+' trasferite al Bar','ok');
      render();
      setTimeout(function(){tP(id);},80);
      return;
    }
  }
}

function sMez(id,val){
  var ps = gProds();
  for(var i=0;i<ps.length;i++){
    if(ps[i].id===id){
      ps[i].barM=val;
      sProds(ps);
      toast(val?'½ bottiglia registrata':'Bottiglia intera','inf');
      render();
      setTimeout(function(){tP(id);},80);
      return;
    }
  }
}

function vend(id){
  var qty = parseInt(document.getElementById('vi'+id).value)||0;
  if(!qty){toast('Inserisci quantità','err');return;}
  var ps = gProds();
  for(var i=0;i<ps.length;i++){
    if(ps[i].id===id){
      if(qty>(ps[i].bar||0)){toast('Solo '+ps[i].bar+' al bar!','err');return;}
      ps[i].bar=(ps[i].bar||0)-qty;
      sProds(ps);
      addSto({tipo:'venduto',nome:ps[i].n,qty:qty,desc:'-'+qty+' venduto'});
      toast('🔻 '+qty+' vendute — Bar: '+ps[i].bar,'ok');
      render();
      setTimeout(function(){tP(id);},80);
      return;
    }
  }
}

function delP(id){
  if(!confirm('Eliminare questo prodotto?')) return;
  sProds(gProds().filter(function(p){return p.id!==id;}));
  toast('Eliminato','ok');
  render();
}

// ══════════════════════════════════════
// COCKTAIL
// ══════════════════════════════════════
function rCocktail(){
  var prices = gCkP();
  var ck2 = SEARCH ? COCKTAILS.filter(function(c){return c.n.toLowerCase().indexOf(SEARCH.toLowerCase())>=0;}) : COCKTAILS;
  var h = '<div class="tb"><input class="srch" placeholder="🔍 Cerca cocktail..." value="'+SEARCH+'" oninput="SEARCH=this.value;render()"></div>';

  for(var i=0;i<ck2.length;i++){
    var ck = ck2[i];
    var res = costoTotCk(ck);
    var pv = prices[ck.id]||0;
    var pct = fcPct(res.costo,pv);
    var marg = pv>0 ? pv-res.costo : null;

    h += '<div class="card" id="ck-'+ck.id+'">';
    h += '<div class="ck-top" onclick="tCk(\''+ck.id+'\')">';
    h += '<div style="width:36px;height:36px;border-radius:9px;background:rgba(43,168,154,.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+ck.em+'</div>';
    h += '<div class="ck-name">'+ck.n+'</div>';
    h += '<div style="text-align:right;flex-shrink:0">';
    if(res.costo>0) h += '<div style="font-family:Cormorant Garamond,serif;font-size:16px;color:var(--gold);font-weight:600">€'+res.costo.toFixed(2)+'</div>';
    else h += '<div style="font-size:10px;color:var(--muted)">—</div>';
    if(pct!==null) h += '<span class="fc-badge '+fcCls(pct)+'">'+fcIco(pct)+' '+pct.toFixed(0)+'%</span>';
    h += '</div></div>';

    h += '<div id="ckb-'+ck.id+'" style="display:none"><div class="ck-body">';
    h += '<div class="sec-t">🧪 Ingredienti & miscelazione</div>';

    for(var j=0;j<ck.ing.length;j++){
      var ing = ck.ing[j];
      var ic = costoIng(ing);
      h += '<div class="ing-row"><span style="flex:1">'+ing.n+'</span><span class="ing-d">'+ing.d+' '+ing.u+'</span><span class="ing-c">'+(ic!==null?'€'+ic.toFixed(3):'—')+'</span></div>';
    }

    if(res.cnt<res.tot) h += '<div style="font-size:11px;color:var(--muted);margin-top:6px">ℹ️ '+(res.tot-res.cnt)+' ingredienti senza costo</div>';

    h += '<div class="pv-row"><span style="font-size:12px;color:var(--muted);flex:1">💰 Prezzo vendita (€)</span>';
    h += '<input class="pv-in" type="number" step="0.50" value="'+(pv||'')+'" placeholder="0.00" id="pv-'+ck.id+'" oninput="sPV(\''+ck.id+'\')">';
    h += '</div>';

    h += '<div class="ck-sum">';
    h += '<div class="cs-b"><div class="cs-v" style="color:var(--gold)">€'+res.costo.toFixed(2)+'</div><div class="cs-l">Costo</div></div>';
    h += '<div class="cs-b"><div class="cs-v" style="color:var(--g2)" id="mv-'+ck.id+'">'+(marg!==null?'€'+marg.toFixed(2):'—')+'</div><div class="cs-l">Margine</div></div>';
    h += '<div class="cs-b" id="fcb-'+ck.id+'"><div class="cs-v" style="color:'+(pct!==null&&pct>30?'var(--r2)':pct!==null&&pct>20?'var(--o2)':'var(--g2)')+'">'+  (pct!==null?pct.toFixed(0)+'%':'—')+'</div><div class="cs-l">FC%</div></div>';
    h += '<div class="cs-b"><div class="cs-v" style="color:var(--g2)">'+(pct!==null?(100-pct).toFixed(0)+'%':'—')+'</div><div class="cs-l">Marg%</div></div>';
    h += '</div>';

    if(pct!==null&&pct>30){
      h += '<div style="background:rgba(192,82,74,.12);border:1px solid rgba(192,82,74,.3);border-radius:9px;padding:9px 11px;margin-top:8px;font-size:12px;color:var(--r2)">🔴 Food Cost > 30% — prezzo consigliato: €'+(res.costo/0.30).toFixed(2)+'</div>';
    }

    h += '<div class="chips"><span class="chip">🥂 '+ck.b+'</span><span class="chip">🔧 '+ck.te+'</span>'+(ck.g?'<span class="chip">🌿 '+ck.g+'</span>':'')+'</div>';
    h += '</div></div></div>';
  }
  return h;
}

function tCk(id){
  var el = document.getElementById('ckb-'+id);
  var card = document.getElementById('ck-'+id);
  var open = el.style.display!=='none';
  el.style.display = open?'none':'block';
  if(open) card.classList.remove('open'); else card.classList.add('open');
}

function sPV(id){
  var val = parseFloat(document.getElementById('pv-'+id).value)||0;
  var prices = gCkP(); prices[id]=val; sCkP(prices);
  var ck = null;
  for(var i=0;i<COCKTAILS.length;i++) if(COCKTAILS[i].id===id){ck=COCKTAILS[i];break;}
  if(!ck) return;
  var res = costoTotCk(ck);
  var pct = fcPct(res.costo,val);
  var marg = val>0?val-res.costo:null;
  var mv = document.getElementById('mv-'+id);
  var fb = document.getElementById('fcb-'+id);
  if(mv) mv.textContent = marg!==null?'€'+marg.toFixed(2):'—';
  if(fb){
    var vv = fb.querySelector('.cs-v');
    if(vv){vv.textContent=pct!==null?pct.toFixed(0)+'%':'—';vv.style.color=pct!==null&&pct>30?'var(--r2)':pct!==null&&pct>20?'var(--o2)':'var(--g2)';}
  }
  updateKpi();
}

// ══════════════════════════════════════
// PREPARAZIONI
// ══════════════════════════════════════
function rPrep(){
  var preps = gPreps();
  var h = '<div class="info">⚗️ Inserisci il costo degli ingredienti → il sistema calcola il €/ml e aggiorna il food cost dei cocktail automaticamente.</div>';

  for(var i=0;i<preps.length;i++){
    var p = preps[i];
    var cpm = p.costo&&p.resa ? p.costo/p.resa : 0;
    var resa = 100-(p.perd||0);
    var rc = resa>=70?'var(--g2)':resa>=40?'var(--o2)':'var(--r2)';

    h += '<div class="card" id="pr-'+p.id+'">';
    h += '<div class="prep-top" onclick="tPr(\''+p.id+'\')">';
    h += '<div style="width:38px;height:38px;border-radius:10px;background:rgba(43,168,154,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+p.ic+'</div>';
    h += '<div style="flex:1;min-width:0"><div style="font-family:Cormorant Garamond,serif;font-size:16px">'+p.n+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+p.ing+'</div></div>';
    h += '<div style="text-align:right;flex-shrink:0"><div style="font-family:Cormorant Garamond,serif;font-size:17px;color:var(--gold);font-weight:600">'+(cpm>0?'€'+cpm.toFixed(4):'—')+'</div><div style="font-size:9px;color:var(--muted)">€/ml</div></div>';
    h += '</div>';

    h += '<div id="prb-'+p.id+'" style="display:none"><div class="prep-body">';
    if(p.perd>0){
      h += '<div class="resa-lbl"><span>Resa lavorazione</span><span style="color:'+rc+';font-weight:600">'+resa+'% (perdita '+p.perd+'%)</span></div>';
      h += '<div class="resa-bar"><div class="resa-f" style="width:'+resa+'%;background:'+rc+'"></div></div>';
    }
    h += '<div style="background:rgba(43,168,154,.03);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;color:var(--muted)">🎯 '+p.note+'</div>';
    for(var j=0;j<p.steps.length;j++){
      h += '<div class="step"><span class="sn">'+(j+1)+'</span><span>'+p.steps[j]+'</span></div>';
    }
    h += '<div class="prep-edit"><div class="pe-t">💰 Aggiorna costo ingredienti</div>';
    h += '<div class="pe-grid">';
    h += '<div><div class="pe-l">Costo acquisto (€)</div><input class="pe-in" type="number" step="0.01" id="pa-'+p.id+'" value="'+(p.costo||'')+'" placeholder="0.00"></div>';

function sPrep(id){
  var preps = gPreps();
  for(var i=0;i<preps.length;i++){
    if(preps[i].id===id){
      preps[i].costo = parseFloat(document.getElementById('pa-'+id).value)||0;

// ── Carica rimborso da LT inseriti ──
function cRimbLT(pid,mese,vol){
  var lt = parseFloat(document.getElementById('rlt'+pid).value)||0;
  if(!lt){toast('Inserisci i litri','err');return;}
  var bott = Math.round((lt*1000)/vol);
  if(!bott){toast('Valore troppo piccolo','err');return;}
  var r = gRimb();
  if(!r[mese]) r[mese]={};
  r[mese][pid] = (r[mese][pid]||0)+bott;
  sRimb(r);
  toast('✓ +'+bott+' bott. ('+lt+' LT)','ok');
  render();
}

function openAddRimb(){
  document.getElementById('mTit').textContent = 'Aggiungi Distillato Rimborso';

  });

}

function saveRimb(){
  var n = document.getElementById('rnm').value.trim();
  if(!n){toast('Inserisci il nome','err');return;}
  var vol = parseInt(document.getElementById('rvol').value)||700;
  var ic = document.getElementById('ric').value.trim()||'🍾';
  var g = document.getElementById('rgrp').value;
  var note = g==='altro' ? (document.getElementById('rnote').value.trim()||'Gestito da altro') : '';
  var prods = gRimbProds();
  var newId = 'cr_'+Date.now();
  var obj = {id:newId,n:n,vol:vol,g:g,ic:ic};
  if(g==='altro') obj.note = note;
  prods.push(obj);
  sRimbProds(prods);
  RIMB_PRODS = prods;
  closeModal();
  toast('✓ '+n+' aggiunto ai rimborsi','ok');
  render();
}

function delRimb(pid){
  if(!confirm('Rimuovere questo distillato dai rimborsi?')) return;
  var prods = gRimbProds().filter(function(p){return p.id!==pid;});
  sRimbProds(prods);
  RIMB_PRODS = prods;
  toast('Rimosso','ok');
  render();
}

// ── Rimborso +/- per bottiglia ──
function chR(pid,mese,d){
  var r = gRimb();
  if(!r[mese]) r[mese]={};
  r[mese][pid] = Math.max(0,(r[mese][pid]||0)+d);
  sRimb(r);
  render();
}

function chiudiMese(mese){
  if(!confirm('Chiudere '+getMeseLbl(mese)+'?')) return;
  var r = gRimb();
  var dm = r[mese]||{};
  var stoR = gStoR();
  var tL = 0;
  var prodotti = [];
  for(var i=0;i<RIMB_PRODS.length;i++){
    var rp = RIMB_PRODS[i];
    if(rp.g!=='noi') continue;
    var b = dm[rp.id]||0;
    var litri = parseFloat((b*rp.vol/1000).toFixed(2));
    tL += litri;
    prodotti.push({nome:rp.n,bott:b,litri:litri});
  }
  stoR.push({mese:mese,totLitri:tL.toFixed(2),prodotti:prodotti});
  sStoR(stoR);
  delete r[mese];
  sRimb(r);
  toast('✅ '+getMeseLbl(mese)+' chiuso — '+tL.toFixed(2)+' LT','ok');
  render();
}

// REPORT
// ══════════════════════════════════════
function rReport(){
  var ps = gProds();
  var prices = gCkP();
  var tMag=0,tBar=0,vMag=0;
  var alerts = [];
  for(var i=0;i<ps.length;i++){
    tMag+=ps[i].mag||0;
    tBar+=(ps[i].bar||0)+(ps[i].barM?0.5:0);
    vMag+=(ps[i].mag||0)*(ps[i].pA||0);
    if((ps[i].mag||0)+(ps[i].bar||0)<=(ps[i].min||0)) alerts.push(ps[i]);
  }

  var ckData = [];
  var fcTot=0,fcN=0;
  for(var i=0;i<COCKTAILS.length;i++){
    var ck = COCKTAILS[i];
    var res = costoTotCk(ck);
    var pv = prices[ck.id]||0;
    var pct = fcPct(res.costo,pv);
    if(pct!==null){fcTot+=pct;fcN++;}
    ckData.push({n:ck.n,em:ck.em,costo:res.costo,pv:pv,pct:pct,marg:pv>0?pv-res.costo:null});
  }
  var avgFC = fcN>0?(fcTot/fcN):0;
  var ckAl = ckData.filter(function(c){return c.pct!==null&&c.pct>30;});

  var h = '<div class="rep-kpi">';
  h += '<div class="rk"><div class="rk-v">'+tMag+'</div><div class="rk-l">📦 Magazzino</div></div>';
  h += '<div class="rk"><div class="rk-v">'+tBar+'</div><div class="rk-l">🍾 Bar</div></div>';
  h += '<div class="rk"><div class="rk-v">€'+vMag.toFixed(0)+'</div><div class="rk-l">Valore Mag.</div></div>';
  h += '<div class="rk"><div class="rk-v" style="color:'+(avgFC>30?'var(--r2)':avgFC>20?'var(--o2)':'var(--g2)')+'">'+  (avgFC>0?avgFC.toFixed(0)+'%':'—')+'</div><div class="rk-l">Avg FC</div></div>';
  h += '</div>';

  if(ckAl.length){
    h += '<div class="sec-t" style="margin-top:0">🔴 Cocktail Food Cost sopra 30%</div>';
    for(var i=0;i<ckAl.length;i++){
      h += '<div class="al-row al-r"><span>'+ckAl[i].em+' '+ckAl[i].n+'</span><span style="color:var(--r2);font-weight:600">'+ckAl[i].pct.toFixed(1)+'% — min. €'+(ckAl[i].costo/0.30).toFixed(2)+'</span></div>';
    }
  }

  if(alerts.length){
    h += '<div class="sec-t">⚠️ Sotto scorta minima</div>';
    for(var i=0;i<alerts.length;i++){
      h += '<div class="al-row al-o"><span>'+(CAT_ICS[alerts[i].c]||'🍾')+' '+alerts[i].n+'</span><span style="color:var(--o2);font-weight:600">Mag:'+(alerts[i].mag||0)+' Bar:'+(alerts[i].bar||0)+'/min.'+alerts[i].min+'</span></div>';
    }
  }

  var ckM = ckData.filter(function(c){return c.pv>0;}).sort(function(a,b){return (b.marg||0)-(a.marg||0);});
  if(ckM.length){
    h += '<div class="sec-t">💰 Margine Cocktail</div>';
    var maxM = ckM[0].marg||1;
    for(var i=0;i<Math.min(8,ckM.length);i++){
      h += '<div class="bar-r"><div class="bar-lb"><span>'+ckM[i].em+' '+ckM[i].n+'</span><span style="color:var(--gold)">€'+(ckM[i].marg||0).toFixed(2)+'</span></div><div class="bar-bg"><div class="bar-f" style="width:'+(((ckM[i].marg||0)/maxM)*100)+'%"></div></div></div>';
    }
  }
  return h;
}

  '<div class="fl"><label>Scorta minima</label><input class="fi" id="fmin" type="number" value="'+(p?p.min:2)+'" min="0"></div>'+
  '<div class="m-div"></div><div class="m-sub">💰 Prezzi</div>'+
  '<div class="frow"><div class="fl"><label>Prezzo acquisto (€)</label><input class="fi" id="facq" type="number" step="0.01" value="'+(p&&p.pA?p.pA:'')+'" placeholder="0.00"></div><div class="fl"><label>Prezzo vendita dose (€)</label><input class="fi" id="fvnd" type="number" step="0.50" value="'+(p&&p.pV?p.pV:'')+'" placeholder="0.00"></div></div>'+
  '<div class="fl"><label>Dose standard (ml)</label><input class="fi" id="fdose" type="number" value="'+(p?p.dose:50)+'" placeholder="50"><div class="hint">Es: gin 50ml, vermouth 20ml, birra 330ml</div></div>'+
  '<button class="btn-sub" onclick="saveP()">💾 Salva</button><button class="btn-cnl" onclick="closeModal()">Annulla</button>';
}

function saveP(){
  var n = document.getElementById('fn').value.trim();
  if(!n){toast('Inserisci il nome','err');return;}
  var ps = gProds();
  var obj = {
    n:n,
    c:document.getElementById('fc').value,
    vol:parseInt(document.getElementById('fv').value)||700,
    mag:parseInt(document.getElementById('fmag').value)||0,
    bar:parseInt(document.getElementById('fbar').value)||0,
    barM:false,
    min:parseInt(document.getElementById('fmin').value)||2,
    pA:parseFloat(document.getElementById('facq').value)||0,
    pV:parseFloat(document.getElementById('fvnd').value)||0,
    dose:parseInt(document.getElementById('fdose').value)||50
  };
  if(editId){
    for(var i=0;i<ps.length;i++){
      if(ps[i].id===editId){obj.id=editId;obj.barM=ps[i].barM;ps[i]=obj;break;}
    }
  } else {
    obj.id = Date.now();
    ps.push(obj);
  }
  sProds(ps);
  closeModal();
  toast(editId?'✓ Aggiornato':'✓ Aggiunto','ok');
  render();
}

// NAV & UTILS
// ══════════════════════════════════════
function nav(v){
  VIEW=v; CAT_F='tutti'; SEARCH='';
  var ns = document.querySelectorAll('.ni');
  var vs = ['mag','bar','cocktail','prep','rimborsi','acquisti','report'];
  for(var i=0;i<ns.length;i++){
    if(vs[i]===v) ns[i].classList.add('on'); else ns[i].classList.remove('on');
  }
  render();
}

function setC(t){CAT_F=t;render();}

// ══════════════════════════════════════
// ACQUISTI BAR
// ══════════════════════════════════════
function gAcqBar(){return sg('bb_acq_bar')||[];}
function sAcqBar(v){ss('bb_acq_bar',v);}

function rAcquisti(){
  var acq = gAcqBar();
  var h = '<div class="info" style="background:rgba(244,184,200,.1);border-color:rgba(244,184,200,.3)">📥 Registra ogni fattura. Il carico aggiorna automaticamente la giacenza in magazzino.</div>';
  h += '<button class="btn-add" style="width:100%;margin-bottom:14px;padding:13px;font-size:14px" onclick="openAddAcqBar()">+ Registra Acquisto / Fattura</button>';

  if(!acq.length){
    h += '<div class="empty"><div class="ei">📋</div><p>Nessun acquisto registrato</p></div>';
    return h;
  }

  // Raggruppa per data
  var byDate = {};
  for(var i=acq.length-1;i>=0;i--){
    var a=acq[i]; var d=a.data||'—';
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(a);
  }
  var dates = Object.keys(byDate).sort().reverse();
  for(var di=0;di<dates.length;di++){
    h += '<div class="sec-t">'+dates[di]+'</div>';
    var list = byDate[dates[di]];
    for(var i=0;i<list.length;i++){
      var a = list[i];
      h += '<div class="card" style="padding:12px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">';
      h += '<span style="font-family:\'Cormorant Garamond\',serif;font-size:15px;flex:1;padding-right:8px">'+a.n+'</span>';
      h += '<span style="font-family:\'Cormorant Garamond\',serif;font-size:20px;color:var(--b2);font-weight:600;flex-shrink:0">+'+a.q+'</span>';
      h += '</div>';
      h += '<div style="font-size:10px;color:var(--muted);line-height:1.8">';
      h += a.fornitore+(a.fattura?' &middot; Fatt. N&deg;'+a.fattura:'');
      if(a.euro>0) h += ' &middot; <strong style="color:var(--gold)">&#8364;'+a.euro.toFixed(2)+'</strong>';
      h += '<br>Destinazione: <strong>'+a.dest+'</strong>';
      h += '</div>';
      h += '<button onclick="delAcqBar('+a.id+')" style="margin-top:8px;background:transparent;border:1px solid rgba(192,82,74,.3);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--r2);cursor:pointer;font-family:\'DM Sans\',sans-serif">🗑️ Elimina</button>';
      h += '</div>';
    }
  }
  return h;
}

function openAddAcqBar(){
  document.getElementById('mTit').textContent = 'Registra Acquisto';
  // Autocompletamento prodotti esistenti
  var ps = gProds(); var dlOpts = '';
  for(var i=0;i<ps.length;i++) dlOpts += '<option value="'+ps[i].n+'">';
  var today = new Date().toISOString().split('T')[0];
  var h = '';
  h += '<div class="fl"><label>Prodotto</label><input class="fi" id="aqn" placeholder="Es. Bombay Sapphire 100CL" list="aq-dl"><datalist id="aq-dl">'+dlOpts+'</datalist></div>';
  h += '<div class="frow"><div class="fl"><label>Quantità</label><input class="fi" id="aqq" type="number" placeholder="0" min="1"></div><div class="fl"><label>Importo €</label><input class="fi" id="aqe" type="number" step="0.01" placeholder="0.00"></div></div>';
  h += '<div class="m-div"></div><div class="m-sub">📋 Fattura</div>';
  h += '<div class="frow"><div class="fl"><label>Fornitore</label><input class="fi" id="aqf" placeholder="Fornitore" list="forn-dl"><datalist id="forn-dl"><option value="Enoteca Conte S.r.l."><option value="Re.Ga Service S.a.S."><option value="Spiritual S.r.l."><option value="Sunrise S.p.A."></datalist></div><div class="fl"><label>N° Fattura</label><input class="fi" id="aqft" placeholder="Es. 1810"></div></div>';
  h += '<div class="fl"><label>Data</label><input class="fi" id="aqd" type="date" value="'+today+'"></div>';
  h += '<div class="fl"><label>Destinazione</label><select class="fi" id="aqDest"><option value="Magazzino">📦 Magazzino</option><option value="Bar Interno">🍾 Bar Interno</option><option value="Bar Esterno">🌿 Bar Esterno</option></select></div>';
  h += '<button class="btn-sub" onclick="saveAcqBar()">📥 Registra e Carica</button>';
  h += '<button class="btn-cnl" onclick="closeModal()">Annulla</button>';
  document.getElementById('mBody').innerHTML = h;
  document.getElementById('ovl').classList.add('on');
}

function saveAcqBar(){
  if(!checkMgr()) return;
  var n = document.getElementById('aqn').value.trim();
  var q = parseInt(document.getElementById('aqq').value)||0;
  if(!n||!q){toast('Nome e quantità obbligatori','err');return;}
  var forn = document.getElementById('aqf').value.trim()||'—';
  var fattura = document.getElementById('aqft').value.trim();
  var dateval = document.getElementById('aqd').value;
  var euro = parseFloat(document.getElementById('aqe').value)||0;
  var dest = document.getElementById('aqDest').value;
  // Formatta data
  var dp = dateval.split('-');
  var dataFmt = dp.length===3 ? dp[2]+'/'+dp[1]+'/'+dp[0] : dateval;
  // Aggiorna giacenza prodotto in magazzino se trovato
  if(dest==='Magazzino'){
    var ps = gProds();
    for(var i=0;i<ps.length;i++){
      if(ps[i].n.toLowerCase()===n.toLowerCase()){
        ps[i].mag=(ps[i].mag||0)+q;
        sProds(ps);
        break;
      }
    }
  }
  // Salva acquisto
  var acq = gAcqBar();
  acq.push({id:Date.now(),n:n,q:q,fornitore:forn,fattura:fattura,data:dataFmt,dest:dest,euro:euro});
  sAcqBar(acq);
  addSto({tipo:'carico',nome:n,qty:q,desc:'Fattura '+fattura+' - '+forn+' → '+dest});
  closeModal();
  toast('✅ +'+q+' '+n+' → '+dest,'ok');
  render();
}

function delAcqBar(id){
  if(!confirm('Eliminare questo acquisto?')) return;
  sAcqBar(gAcqBar().filter(function(a){return a.id!==id;}));
  toast('Eliminato','ok'); render();
}

function closeModal(){document.getElementById('ovl').classList.remove('on');}
function closeBg(e){if(e.target.id==='ovl') closeModal();}

function toast(msg,type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on '+(type||'ok');
  setTimeout(function(){t.classList.remove('on');},2800);
}

// START — carica dal server condiviso poi renderizza
loadFromServer();
</script>
